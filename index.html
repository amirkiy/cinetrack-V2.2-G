<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineTrack AI Ultimate</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0a0a0a; --bg-surface: #141414; --bg-card: #1f1f1f;
      --accent: #e50914; --accent-hover: #b80710;
      --text-main: #ffffff; --text-muted: #aaaaaa;
      --border: rgba(255, 255, 255, 0.1); --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      --cyan: #00bcd4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; padding-bottom: 60px; }
    header { background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); flex-wrap: wrap; gap: 15px; }
    .brand { font-size: 24px; font-weight: 900; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .search-container { position: relative; width: 35%; max-width: 500px; min-width: 250px; }
    .search-wrapper { display: flex; align-items: center; background: #222; border: 1px solid var(--border); border-radius: 30px; padding: 2px 15px; }
    .search-wrapper input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; }
    .search-wrapper button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; }
    .search-dropdown { position: absolute; top: 105%; left: 0; right: 0; background: #1c1c1c; border: 1px solid var(--border); border-radius: 12px; max-height: 400px; overflow-y: auto; z-index: 200; display: none; }
    .search-item { display: flex; gap: 15px; padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; }
    .search-item:hover { background: #282828; }
    .search-item img { width: 45px; height: 65px; object-fit: cover; border-radius: 4px; }
    .nav-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { background: var(--accent-hover); }
    .btn-secondary { background: #2a2a2a; border: 1px solid var(--border); }
    .btn-secondary:hover { background: #3a3a3a; }
    .btn-delete { background: #551111; }
    .hero-section { margin: 30px; background: linear-gradient(135deg, #1c1c1c 0%, #111 100%); border-radius: 20px; padding: 30px; border: 1px solid var(--border); position: relative; min-height: 350px; display: flex; align-items: center; }
    .hero-empty { text-align: center; width: 100%; color: var(--text-muted); font-size: 18px; }
    .hero-content { display: flex; gap: 40px; width: 100%; align-items: flex-start; }
    .hero-poster { width: 200px; height: 300px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); }
    .hero-details { flex: 1; }
    .hero-title { font-size: 30px; font-weight: 900; margin-bottom: 10px; color: #fff; }
    .badge { background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; color: #fff; }
    .progress-box { background: rgba(0,188,212,0.07); border: 1px solid rgba(0,188,212,0.2); border-radius: 10px; padding: 12px 15px; margin-bottom: 15px; }
    .progress-label { font-size: 13px; color: var(--cyan); font-weight: bold; margin-bottom: 6px; }
    #crawlerTracker { background: rgba(0, 188, 212, 0.08); border: 1px dashed rgba(0, 188, 212, 0.4); border-radius: 10px; padding: 14px; margin-top: 15px; color: var(--cyan); font-size: 13px; display: none; }
    .main-grid { margin: 0 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
    .movie-card { background: var(--bg-surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
    .movie-card.selected { border-color: var(--accent); }
    .card-poster-wrapper { position: relative; width: 100%; height: 280px; }
    .card-poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .card-info { padding: 12px; }
    .card-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 300; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; }
    .modal-backdrop.active { opacity: 1; pointer-events: auto; }
    .modal-box { background: #1c1c1c; border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 620px; max-height: 88vh; overflow-y: auto; padding: 25px; }
    .form-control { width: 100%; background: #2b2b2b; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: #fff; }
  </style>
</head>
<body>

  <header>
    <div class="brand">🎬 CineTrack AI <span style="font-size:12px; background:#e50914; color:#fff; padding:2px 6px; border-radius:4px;">ULTIMATE</span></div>
    <div class="search-container">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="جستجوی فیلم یا سریال انگلیسی..." oninput="handleSearch(this.value)">
        <button onclick="clearSearchInput()">✖</button>
      </div>
      <div id="searchDropdown" class="search-dropdown"></div>
    </div>
    <div class="nav-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('settingsModal').classList.add('active')">⚙️ تنظیمات</button>
    </div>
  </header>

  <section class="hero-section" id="heroSection"></section>
  <main class="main-grid" id="mainGrid"></main>

  <div class="modal-backdrop" id="addModal">
    <div class="modal-box">
      <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3 id="modalMetaTitle">افزودن به آرشیو</h3>
        <button class="btn btn-secondary" onclick="document.getElementById('addModal').classList.remove('active')">✖</button>
      </div>
      <div id="addModalContent"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="settingsModal">
    <div class="modal-box">
      <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3>⚙️ تنظیمات</h3>
        <button class="btn btn-secondary" onclick="document.getElementById('settingsModal').classList.remove('active')">✖</button>
      </div>
      <div style="margin-bottom:15px;">
        <label>API Key هوش مصنوعی (برای تحلیل نقد):</label>
        <input type="password" id="openRouterKeyInput" class="form-control" style="margin-top:5px;">
      </div>
      <div style="margin-bottom:15px;">
        <label>آدرس سایت مرجع (آرشیو سریال‌ها):</label>
        <input type="text" id="externalUrlInput" class="form-control" style="margin-top:5px;" value="https://dls2.film2cinemaha.top/DonyayeSerial/donyaye_serial_all_archive.html">
      </div>
      <button class="btn" style="width:100%;" onclick="saveSettings()">💾 ذخیره</button>
    </div>
  </div>

  <script>
    const OMDB_KEY = "4b0254f3";
    let state = {
      items: JSON.parse(localStorage.getItem("cinetrack_ultimate_db") || "[]"),
      selectedId: null,
      omdbCache: JSON.parse(localStorage.getItem("cinetrack_omdb_cache") || "{}")
    };
    let searchDebounceTimer;

    function init() {
      renderGrid();
      renderHero();
      document.getElementById("openRouterKeyInput").value = localStorage.getItem("cinetrack_or_key") || "";
      document.getElementById("externalUrlInput").value = localStorage.getItem("cinetrack_external_url") || "https://dls2.film2cinemaha.top/DonyayeSerial/donyaye_serial_all_archive.html";
    }

    function saveState() {
      localStorage.setItem("cinetrack_ultimate_db", JSON.stringify(state.items));
      renderGrid();
      renderHero();
    }

    /* ============================================================
       🚀 PURE JAVASCRIPT CRAWLER (NO AI BOTTLENECK)
    ============================================================ */
    async function fetchHtmlLinks(url) {
        const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
        try {
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error("پروکسی خطا داد.");
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            return Array.from(doc.querySelectorAll("a"))
                .map(a => a.getAttribute("href"))
                .filter(h => h && !h.startsWith("?") && !h.includes("../") && h !== "/")
                .map(h => { try { return new URL(h, url).href; } catch(e) { return h; } });
        } catch(e) {
            throw new Error("خطا در بارگیری آدرس: " + url);
        }
    }

    function cleanString(str) { return decodeURIComponent(str).toLowerCase().replace(/[^a-z0-9]/g, ''); }

    async function pureCrawlerFindLink(item, season, episode) {
        let tracker = document.getElementById("crawlerTracker");
        if (!tracker) {
            tracker = document.createElement("div"); tracker.id = "crawlerTracker";
            const details = document.querySelector(".hero-details"); if(details) details.appendChild(tracker);
        }
        tracker.style.display = "block";
        const log = (msg) => { tracker.innerHTML = `⚡ <b>موتور اسکنر بومی:</b> ${msg}`; };
        
        let currentUrl = localStorage.getItem("cinetrack_external_url") || "https://dls2.film2cinemaha.top/DonyayeSerial/donyaye_serial_all_archive.html";
        
        try {
            // STEP 1: Find Series
            log(`جستجوی فولدر سریال "${item.title}"...`);
            let links = await fetchHtmlLinks(currentUrl);
            let targetClean = cleanString(item.title);
            
            let matchedLink = links.find(l => cleanString(l).includes(targetClean) || targetClean.includes(cleanString(l)));
            if (!matchedLink) {
                // Try just the first word
                let firstWord = item.title.split(' ')[0].toLowerCase().replace(/[^a-z0-9]/g, '');
                matchedLink = links.find(l => cleanString(l).includes(firstWord));
            }
            if (!matchedLink) throw new Error("پوشه سریال پیدا نشد.");
            currentUrl = matchedLink; if(!currentUrl.endsWith('/')) currentUrl += '/';

            // STEP 2: Find Season
            log(`جستجوی فولدر فصل ${season}...`);
            links = await fetchHtmlLinks(currentUrl);
            const sPad = season.toString().padStart(2, '0');
            matchedLink = links.find(l => {
                let cl = cleanString(l);
                return cl.includes(`s${sPad}`) || cl.includes(`season${season}`) || cl.includes(`season${sPad}`);
            });
            if (!matchedLink) throw new Error(`پوشه فصل ${season} پیدا نشد.`);
            currentUrl = matchedLink; if(!currentUrl.endsWith('/')) currentUrl += '/';

            // STEP 3: Check Quality Folders
            log(`بررسی کیفیت‌ها...`);
            links = await fetchHtmlLinks(currentUrl);
            const hasVideos = links.some(l => l.toLowerCase().endsWith('.mkv') || l.toLowerCase().endsWith('.mp4'));
            
            if (!hasVideos) {
                matchedLink = links.find(l => l.includes('1080')) || links.find(l => l.includes('720')) || links[0];
                currentUrl = matchedLink; if(!currentUrl.endsWith('/')) currentUrl += '/';
                links = await fetchHtmlLinks(currentUrl);
            }

            // STEP 4: Find Episode File
            log(`پیدا کردن فایل ویدیوی قسمت ${episode}...`);
            const ePad = episode.toString().padStart(2, '0');
            matchedLink = links.find(l => {
                let cl = cleanString(l);
                return (l.toLowerCase().endsWith('.mkv') || l.toLowerCase().endsWith('.mp4')) && 
                       (cl.includes(`e${ePad}`) || cl.includes(`ep${ePad}`) || cl.includes(`episode${episode}`));
            });

            // Fallback if strict episode pattern fails: find any video containing the number
            if (!matchedLink) {
                matchedLink = links.find(l => {
                    let filename = l.split('/').pop().toLowerCase();
                    return (filename.endsWith('.mkv') || filename.endsWith('.mp4')) && filename.includes(ePad);
                });
            }

            if (!matchedLink) throw new Error(`فایل قسمت ${episode} پیدا نشد.`);

            log(`✅ فایل پیدا شد!`);
            setTimeout(() => { tracker.style.display = "none"; }, 1500);
            return matchedLink;

        } catch (e) {
            log(`❌ ${e.message}`);
            setTimeout(() => { tracker.style.display = "none"; }, 3000);
            return null;
        }
    }

    async function handleEpisodeClick(id, direction) {
      const item = state.items.find(i => i.id === id); if (!item) return;
      let targetSeason = parseInt(item.season); let targetEpisode = parseInt(item.episode);

      if (direction === 'next') { targetEpisode += 1; } 
      else if (direction === 'prev') {
        if (targetEpisode > 1) { targetEpisode -= 1; }
        else if (targetSeason > 1) { targetSeason -= 1; targetEpisode = 1; } 
        else { alert("قسمت قبلی وجود ندارد."); return; }
      }

      const directUrl = await pureCrawlerFindLink(item, targetSeason, targetEpisode);
      if (directUrl) window.open(directUrl, "_blank");
      else {
          if(confirm("سیستم نتوانست لینک را پیدا کند. سایت مرجع را باز کنم؟")) {
             window.open(localStorage.getItem("cinetrack_external_url"), "_blank");
          }
      }
    }

    /* ============================================================
       OMDB & UI CONTROLS
    ============================================================ */
    function handleSearch(query) {
      clearTimeout(searchDebounceTimer);
      const dropdown = document.getElementById("searchDropdown");
      if (!query || query.trim().length < 3) { dropdown.style.display = "none"; return; }
      searchDebounceTimer = setTimeout(async () => {
        try {
          const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=${encodeURIComponent(query.trim())}`);
          const data = await res.json();
          if (data.Response === "True") {
            dropdown.innerHTML = data.Search.map(item => `
              <div class="search-item" onclick="fetchItemDetails('${item.imdbID}')">
                <img src="${item.Poster !== 'N/A' ? item.Poster : 'https://via.placeholder.com/45x65?text=N/A'}">
                <div class="info"><h4>${item.Title}</h4><p>${item.Year}</p></div>
              </div>`).join('');
            dropdown.style.display = "block";
          }
        } catch (e) { console.error(e); }
      }, 400);
    }

    function clearSearchInput() { document.getElementById("searchInput").value = ""; document.getElementById("searchDropdown").style.display = "none"; }

    async function fetchItemDetails(imdbID) {
      document.getElementById("searchDropdown").style.display = "none";
      try {
        const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${imdbID}&plot=short`);
        const data = await res.json();
        openAddModal(data);
      } catch (e) { alert("خطا در ارتباط با OMDb"); }
    }

    function openAddModal(data) {
      const isSeries = data.Type === "series";
      document.getElementById("addModalContent").innerHTML = `
        <div style="display:flex; gap:20px; margin-bottom:20px;">
          <img src="${data.Poster}" style="width:100px; border-radius:8px;">
          <div><h3>${data.Title}</h3><p>${data.Year} | ${data.Genre}</p></div>
        </div>
        <input type="hidden" id="formImdbID" value="${data.imdbID}">
        <input type="hidden" id="formTitle" value="${data.Title}">
        <input type="hidden" id="formPoster" value="${data.Poster}">
        <input type="hidden" id="formType" value="${data.Type}">
        ${isSeries ? `
          <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div style="flex:1"><label>فصل:</label><input type="number" id="formSeason" class="form-control" value="1"></div>
            <div style="flex:1"><label>قسمت:</label><input type="number" id="formEpisode" class="form-control" value="1"></div>
          </div>
        ` : ''}
        <button class="btn" style="width:100%;" onclick="saveNewItem()">ثبت در آرشیو</button>
      `;
      document.getElementById("addModal").classList.add("active");
    }

    function saveNewItem() {
      const id = document.getElementById("formImdbID").value;
      if (state.items.some(i => i.id === id)) { alert("موجود است."); return; }
      const type = document.getElementById("formType").value;
      const newItem = {
        id: id,
        title: document.getElementById("formTitle").value,
        poster: document.getElementById("formPoster").value,
        type: type,
        season: type === 'series' ? document.getElementById("formSeason").value : 0,
        episode: type === 'series' ? document.getElementById("formEpisode").value : 0
      };
      state.items.push(newItem);
      state.selectedId = id;
      saveState();
      document.getElementById("addModal").classList.remove("active");
    }

    function renderGrid() {
      const grid = document.getElementById("mainGrid");
      grid.innerHTML = state.items.map(item => `
        <div class="movie-card ${item.id === state.selectedId ? 'selected' : ''}" onclick="state.selectedId='${item.id}'; renderHero(); renderGrid();">
          <div class="card-poster-wrapper"><img src="${item.poster}"></div>
          <div class="card-info"><div class="card-title">${item.title}</div></div>
        </div>`).join('');
    }

    function renderHero() {
      const container = document.getElementById("heroSection");
      if (!state.selectedId) { container.innerHTML = `<div class="hero-empty">یک اثر انتخاب کنید.</div>`; return; }
      
      const item = state.items.find(i => i.id === state.selectedId);
      const isSeries = item.type === "series";

      const streamBtns = isSeries ? `
        <button class="btn btn-prev" onclick="handleEpisodeClick('${item.id}', 'prev')">⏮️ قبلی</button>
        <button class="btn btn-watch" onclick="handleEpisodeClick('${item.id}', 'current')">▶️ پخش S${item.season}E${item.episode}</button>
        <button class="btn btn-next" onclick="handleEpisodeClick('${item.id}', 'next')">⏭️ بعدی</button>
      ` : `<button class="btn btn-watch" onclick="window.open(localStorage.getItem('cinetrack_external_url'), '_blank')">🌐 جستجو در آرشیو</button>`;

      container.innerHTML = `
        <div class="hero-content">
          <img class="hero-poster" src="${item.poster}">
          <div class="hero-details">
            <h1 class="hero-title">${item.title}</h1>
            <div class="hero-actions" style="margin-top:20px;">
              ${streamBtns}
              <button class="btn btn-delete" onclick="deleteItem('${item.id}')">🗑️ حذف</button>
            </div>
            ${isSeries ? `
            <div style="margin-top:20px; display:flex; gap:10px;">
               <div><label style="color:#aaa; font-size:12px;">فصل فعلی</label><br><input type="number" class="form-control" value="${item.season}" onchange="updateEp('${item.id}', this.value, 'season')" style="width:70px;"></div>
               <div><label style="color:#aaa; font-size:12px;">قسمت فعلی</label><br><input type="number" class="form-control" value="${item.episode}" onchange="updateEp('${item.id}', this.value, 'episode')" style="width:70px;"></div>
            </div>` : ''}
          </div>
        </div>`;
    }

    function updateEp(id, val, type) {
      const item = state.items.find(i => i.id === id);
      if(item) { item[type] = parseInt(val) || 1; saveState(); }
    }

    function deleteItem(id) {
      state.items = state.items.filter(i => i.id !== id);
      state.selectedId = null; saveState();
    }

    function saveSettings() {
      localStorage.setItem("cinetrack_or_key", document.getElementById("openRouterKeyInput").value);
      localStorage.setItem("cinetrack_external_url", document.getElementById("externalUrlInput").value);
      document.getElementById('settingsModal').classList.remove('active');
    }

    window.onload = init;
  </script>
</body>
</html>
